name: optcg-scraper

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      manual_run_token:
        description: "Owner-only token for manual runs"
        required: true
        type: string

concurrency:
  group: scraper-singleton
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate manual trigger token
        if: github.event_name == 'workflow_dispatch'
        env:
          EXPECTED_TOKEN: ${{ secrets.SCRAPER_MANUAL_RUN_TOKEN }}
          PROVIDED_TOKEN: ${{ github.event.inputs.manual_run_token }}
        run: |
          if [ -z "$EXPECTED_TOKEN" ] || [ "$EXPECTED_TOKEN" != "$PROVIDED_TOKEN" ]; then
            echo "Invalid manual run token."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Validate scraper environment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm scrape:validate

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm scrape
