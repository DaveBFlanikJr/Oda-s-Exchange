name: deployment-readiness

on:
  workflow_dispatch:

concurrency:
  group: deployment-readiness
  cancel-in-progress: false

jobs:
  readiness:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate deployment readiness contract
        run: pnpm test:deployment-readiness

      - name: Run price ingestion fixture tests
        run: pnpm test:price-ingestion

      - name: Verify applied migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm migrations:verify

      - name: Typecheck
        run: pnpm typecheck
